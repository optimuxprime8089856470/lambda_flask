<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #12121a;
            color: #fff;
            min-height: 100vh;
        }

        nav {
            background: #1f1f2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a3d;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #6c63ff;
        }

        .logout-btn {
            text-decoration: none;
            color: #fff;
            background: #ef4444;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .welcome {
            margin-bottom: 30px;
        }

        .welcome h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .welcome p {
            color: #aaa;
            font-size: 14px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            display: block;
            background: #1f1f2e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2a2a3d;
            text-decoration: none;
            transition: 0.2s;
            color: inherit;
        }

        .card:hover {
            border-color: #6c63ff;
        }

        .card h3 {
            margin-bottom: 6px;
            font-size: 16px;
            color: #6c63ff;
        }

        .card p {
            font-size: 13px;
            color: #bbb;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">Dashboard</div>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </nav>

    <div class="container">

        <div class="welcome">
            <h1>Welcome, {{ username }} 👋</h1>
            <p>You are logged in. Manage your account from here.</p>
        </div>

        <div class="cards">
            <a href="#" class="card">
                <h3>Profile</h3>
                <p>View your account details.</p>
            </a>

            <a href="#" class="card">
                <h3>Settings</h3>
                <p>Update preferences and security.</p>
            </a>

            <a href="#" class="card">
                <h3>Activity</h3>
                <p>See your recent activity.</p>
            </a>
        </div>

    </div>

    <footer>
        © 2026 Your App
    </footer>

</body>

</html>
